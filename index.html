<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güleryüz Cafe & Restaurant</title>
    <!-- Firebase Kütüphaneleri -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; color: #333; margin: 0; padding: 0; }
        .header { background-color: #fff; text-align: center; padding: 20px; border-bottom: 2px solid #eaeaea; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; color: #2c3e50; font-size: 26px; letter-spacing: 2px; font-weight: 800; }
        .header p { margin: 5px 0 0; color: #7f8c8d; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        /* GÜNÜN MENÜSÜ TASARIMI */
        .daily-menu-wrapper { background-color: #ffffff; border: 1px solid #dcdde1; border-radius: 10px; margin-top: 20px; margin-bottom: 35px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); overflow: hidden; }
        .daily-menu-header { background-color: #2c3e50; padding: 16px; text-align: center; }
        .daily-menu-header h3 { margin: 0; color: #ffffff; font-size: 20px; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        #daily-content { padding: 20px 15px 5px 15px; }
        .dish-list { display: flex; flex-direction: column; gap: 12px; }
        .dish-item { display: flex; align-items: center; background-color: #ffffff; border: 1px solid #f1f2f6; border-left: 4px solid #e74c3c; padding: 12px 15px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); font-size: 15px; font-weight: 600; color: #2f3542; }
        .dish-icon { margin-right: 12px; font-size: 17px; background-color: #fdedec; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
        
        /* FİYAT PAKETLERİ */
        .daily-options-title { font-size: 13px; color: #7f8c8d; text-transform: uppercase; text-align: center; margin: 20px 0 15px 0; letter-spacing: 1px; position: relative; }
        .daily-options-title::before, .daily-options-title::after { content: ""; display: inline-block; width: 40px; height: 1px; background-color: #ecf0f1; vertical-align: middle; margin: 0 10px; }
        .daily-options { display: flex; flex-direction: column; gap: 10px; padding: 0 15px 20px 15px; }
        .daily-option-item { display: flex; justify-content: space-between; align-items: center; background-color: #fcfcfc; border: 1px solid #eee; padding: 12px 15px; border-radius: 8px; }
        .daily-option-name { font-weight: 700; color: #2c3e50; font-size: 15px; }
        .daily-option-price { font-weight: bold; color: #fff; background-color: #e74c3c; padding: 6px 14px; border-radius: 6px; font-size: 14px; }

        /* DİĞER KATEGORİLER (DİNAMİK) */
        .category-title { border-bottom: 2px solid #e74c3c; padding-bottom: 5px; margin-top: 30px; color: #c0392b; font-size: 20px;}
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px dashed #ddd; }
        .menu-item:last-child { border-bottom: none; }
        .item-name { font-weight: 600; color: #2c3e50; }
        .item-desc { font-size: 12px; color: #7f8c8d; display: block; margin-top: 5px; }
        .item-price { font-weight: bold; color: #27ae60; white-space: nowrap; margin-left: 15px; font-size: 16px;}
    </style>
</head>
<body>
    <div class="header">
        <h1>GÜLERYÜZ</h1>
        <p>Cafe & Restaurant</p>
    </div>
    <div class="container">
        
        <!-- GÜNÜN MENÜSÜ ALANI -->
        <div class="daily-menu-wrapper">
            <div class="daily-menu-header">
                <h3>🍽️ GÜNÜN MENÜSÜ</h3>
            </div>
            
            <div id="daily-content">Yükleniyor...</div>
            
            <div class="daily-options-title">Paket Seçenekleri</div>
            
            <div class="daily-options">
                <div class="daily-option-item">
                    <span class="daily-option-name">2 Çeşit Yemek</span>
                    <span class="daily-option-price" id="fiyat-goster-2">₺ --</span>
                </div>
                <div class="daily-option-item">
                    <span class="daily-option-name">3 Çeşit Yemek</span>
                    <span class="daily-option-price" id="fiyat-goster-3">₺ --</span>
                </div>
                <div class="daily-option-item">
                    <span class="daily-option-name">4 Çeşit Yemek</span>
                    <span class="daily-option-price" id="fiyat-goster-4">₺ --</span>
                </div>
            </div>
        </div>

        <!-- ANA YEMEKLER (VERİTABANINDAN GELECEK) -->
        <h2 class="category-title">Ana Yemekler</h2>
        <div class="menu-list" id="ana-yemekler-list">
            Menü yükleniyor...
        </div>

        <!-- İÇECEKLER (VERİTABANINDAN GELECEK) -->
        <h2 class="category-title">İçecekler</h2>
        <div class="menu-list" id="icecekler-list">
            Menü yükleniyor...
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9Nhe3GvmZIBPc0mIrLJAschX5YyzCqIU",
            authDomain: "guleryuzqrmenu.firebaseapp.com",
            projectId: "guleryuzqrmenu",
            storageBucket: "guleryuzqrmenu.firebasestorage.app",
            messagingSenderId: "449556886457",
            appId: "1:449556886457:web:f215f6aa95701de02efc68",
            databaseURL: "https://guleryuzqrmenu-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();


                // GÜNÜN MENÜSÜNÜ ÇEK (4'LÜ YAPI)
        db.ref('gununMenusu').on('value', (snap) => {
            const data = snap.val();
            const displayDiv = document.getElementById("daily-content");
    
            if (data) {
                let html = '<div class="dish-list">';
                // 4 çeşidi sırayla kontrol et ve dolu olanları ekrana bas
                for(let i=1; i<=4; i++) {
                    let yemek = data['c' + i];
                    if (yemek && yemek.trim() !== "") {
                        html += `
                            <div class="dish-item">
                                <span class="dish-icon">🍲</span>
                                <span>${yemek}</span>
                            </div>
                        `;
                    }
                }
                html += '</div>';
                displayDiv.innerHTML = html;
            } else {
                displayDiv.innerHTML = "<div style='text-align:center; padding:10px; color:#7f8c8d;'>Menü henüz girilmedi.</div>";
        }
        });
       
        // 2. PAKET FİYATLARINI ÇEK
        db.ref('paketFiyatlari').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('fiyat-goster-2').innerText = `₺ ${data.c2 || '--'}`;
                document.getElementById('fiyat-goster-3').innerText = `₺ ${data.c3 || '--'}`;
                document.getElementById('fiyat-goster-4').innerText = `₺ ${data.c4 || '--'}`;
            }
        });

        // 3. MENÜ KATEGORİLERİNİ ÇEK VE LİSTELE
        function urunleriEkranaBas(kategori, divId) {
            db.ref('menu/' + kategori).on('value', snap => {
                const div = document.getElementById(divId);
                div.innerHTML = '';
                if(snap.exists()) {
                    snap.forEach(child => {
                        const urun = child.val();
                        let urunHtml = `<div class="menu-item"><div><span class="item-name">${urun.ad}</span>`;
                        if(urun.aciklama) {
                            urunHtml += `<span class="item-desc">${urun.aciklama}</span>`;
                        }
                        urunHtml += `</div><span class="item-price">₺ ${urun.fiyat}</span></div>`;
                        div.innerHTML += urunHtml;
                    });
                } else {
                    div.innerHTML = '<div style="color:#7f8c8d; padding:10px 0;">Henüz ürün eklenmedi.</div>';
                }
            });
        }

        urunleriEkranaBas('anaYemekler', 'ana-yemekler-list');
        urunleriEkranaBas('icecekler', 'icecekler-list');

    </script>
</body>
</html>
