<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menü Yönetimi - Güleryüz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            padding: 20px;
        }
        .admin-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 50px auto;
        }
        h2 { margin-top: 0; color: #2c3e50; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #219150; }
        .status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #27ae60;
            display: none;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Günün Menüsünü Güncelle</h2>
        <p>Bugünün yemeklerini aşağıya yazın (Örn: Süzme Mercimek Çorbası, Orman Kebabı, Pirinç Pilavı, Cacık):</p>
        
        <textarea id="menuInput" placeholder="Bugünün yemeklerini buraya yazın..."></textarea>
        
        <button onclick="saveMenu()">Menüyü Güncelle</button>
        
        <div id="statusMessage" class="status">Menü başarıyla güncellendi!</div>
    </div>

    <script>
        // Sayfa açıldığında eski menüyü textarea'ya doldur
        document.addEventListener("DOMContentLoaded", function() {
            const savedMenu = localStorage.getItem("gununMenusuText");
            if (savedMenu) {
                // HTML formatındaki <br> etiketlerini yeni satıra (\n) çevir
                document.getElementById("menuInput").value = savedMenu.replace(/<br>/g, '\n');
            }
        });

        // Menüyü kaydet
        function saveMenu() {
            let inputText = document.getElementById("menuInput").value;
            // Satır atlamalarını HTML'de görünmesi için <br> etiketine çevir
            let formattedText = inputText.replace(/\n/g, '<br>');
            
            localStorage.setItem("gununMenusuText", formattedText);
            
            const statusMsg = document.getElementById("statusMessage");
            statusMsg.style.display = "block";
            
            setTimeout(() => {
                statusMsg.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
