<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menü Yönetimi - Güleryüz</title>
    <!-- Firebase Kütüphaneleri -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f7; padding: 20px; }
        .admin-container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 50px auto; }
        h2 { margin-top: 0; color: #2c3e50; }
        textarea, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; }
        textarea { height: 120px; resize: vertical; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background-color: #219150; }
        .status { margin-top: 15px; text-align: center; font-weight: bold; display: none; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Günün Menüsünü Güncelle</h2>
        
        <label>Admin Şifresi:</label>
        <input type="password" id="adminPassword" placeholder="Şifreyi giriniz...">

        <label>Bugünün Yemekleri:</label>
        <textarea id="menuInput" placeholder="Örn: Süzme Mercimek Çorbası&#10;Orman Kebabı&#10;Pirinç Pilavı&#10;Cacık"></textarea>
        
        <button onclick="saveMenu()">Menüyü Güncelle</button>
        
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        // BURAYA KENDI FIREBASE CONFIG BILGILERINI YAPISTIR (index.html ile aynı kod)
        const firebaseConfig = {
            apiKey: "AIzaSyB9Nhe3GvmZIBPc0mIrLJAschX5YyzCqIU",
            authDomain: "guleryuzqrmenu.firebaseapp.com",
            databaseURL: "https://guleryuzqrmenu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "guleryuzqrmenu",
            storageBucket: "guleryuzqrmenu.firebasestorage.app",
            messagingSenderId: "449556886457",
            appId: "1:449556886457:web:f215f6aa95701de02efc68"
        };

        // Firebase'i Başlat
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const menuRef = database.ref('gununMenusu');

        // Mevcut menüyü kutuya çek
        menuRef.once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data && data.text) {
                document.getElementById("menuInput").value = data.text.replace(/<br>/g, '\n');
            }
        });

        function saveMenu() {
            const password = document.getElementById("adminPassword").value;
            const statusMsg = document.getElementById("statusMessage");

            // BASİT GÜVENLİK ŞİFRESİ (Burayı değiştirebilirsin)
            if (password !== "1234") {
                statusMsg.className = "status error";
                statusMsg.innerHTML = "Hatalı şifre!";
                statusMsg.style.display = "block";
                return;
            }

            let inputText = document.getElementById("menuInput").value;
            let formattedText = inputText.replace(/\n/g, '<br>'); // Alt satırları HTML koduna çevir

            // Veritabanına Yaz
            menuRef.set({
                text: formattedText,
                updatedAt: new Date().toISOString()
            }).then(() => {
                statusMsg.className = "status success";
                statusMsg.innerHTML = "Menü başarıyla güncellendi! Herkes görebilir.";
                statusMsg.style.display = "block";
                
                setTimeout(() => { statusMsg.style.display = "none"; }, 4000);
            }).catch((error) => {
                statusMsg.className = "status error";
                statusMsg.innerHTML = "Bir hata oluştu: " + error;
                statusMsg.style.display = "block";
            });
        }
    </script>
</body>
</html>
