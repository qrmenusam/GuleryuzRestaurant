<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güleryüz Admin Paneli</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f2f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #34495e; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit;}
        button { background-color: #e74c3c; color: white; border: none; padding: 10px 20px; margin-top: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #c0392b; }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-delete { background-color: #34495e; padding: 5px 10px; font-size: 12px; margin-top: 0; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- GÜNÜN MENÜSÜ YÖNETİMİ (SABİT 4 ÇEŞİT) -->
    <div class="card">
        <h2>Günün Menüsü (4 Çeşit)</h2>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="cesit-1" placeholder="1. Çeşit">
            <input type="text" id="cesit-2" placeholder="2. Çeşit">
            <input type="text" id="cesit-3" placeholder="3. Çeşit">
            <input type="text" id="cesit-4" placeholder="4. Çeşit">
            <button onclick="guncelleGununMenusu()">Tüm Çeşitleri Kaydet</button>
        </div>
    </div>

    <script>
        // Verileri Yükle
        db.ref('gununMenusu').on('value', snap => {
            const data = snap.val();
            if (data) {
                document.getElementById('cesit-1').value = data.c1 || "";
                document.getElementById('cesit-2').value = data.c2 || "";
                document.getElementById('cesit-3').value = data.c3 || "";
                document.getElementById('cesit-4').value = data.c4 || "";
            }
        });
    
    // Kayıt İşlemi
    function guncelleGununMenusu() {
        db.ref('gununMenusu').set({
            c1: document.getElementById('cesit-1').value,
            c2: document.getElementById('cesit-2').value,
            c3: document.getElementById('cesit-3').value,
            c4: document.getElementById('cesit-4').value
        });
        alert("Günün menüsü güncellendi!");
    }
</script>

        <!-- PAKET FİYATLARI -->
        <div class="card">
            <h2>Günün Menüsü Paket Fiyatları</h2>
            <div class="grid-3">
                <div>
                    <label>2 Çeşit Fiyatı (₺)</label>
                    <input type="number" id="fiyat-2">
                </div>
                <div>
                    <label>3 Çeşit Fiyatı (₺)</label>
                    <input type="number" id="fiyat-3">
                </div>
                <div>
                    <label>4 Çeşit Fiyatı (₺)</label>
                    <input type="number" id="fiyat-4">
                </div>
            </div>
            <button onclick="guncellePaketFiyatlari()">Fiyatları Kaydet</button>
        </div>

        <!-- YENİ ÜRÜN EKLE -->
        <div class="card">
            <h2>Yeni Ürün Ekle</h2>
            <label>Kategori</label>
            <select id="urun-kategori">
                <option value="anaYemekler">Ana Yemekler</option>
                <option value="icecekler">İçecekler</option>
            </select>
            
            <label>Ürün Adı</label>
            <input type="text" id="urun-adi" placeholder="Örn: Izgara Köfte">
            
            <label>Açıklama (İsteğe Bağlı)</label>
            <input type="text" id="urun-aciklama" placeholder="Örn: Salata ve patates ile">
            
            <label>Fiyat (₺)</label>
            <input type="number" id="urun-fiyati" placeholder="150">
            
            <button onclick="urunEkle()">Ürünü Ekle</button>
        </div>

        <!-- MEVCUT ÜRÜNLER -->
        <div class="card">
            <h2>Mevcut Menü</h2>
            <h3>Ana Yemekler</h3>
            <div id="admin-ana-yemekler">Yükleniyor...</div>
            <h3>İçecekler</h3>
            <div id="admin-icecekler">Yükleniyor...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9Nhe3GvmZIBPc0mIrLJAschX5YyzCqIU",
            authDomain: "guleryuzqrmenu.firebaseapp.com",
            projectId: "guleryuzqrmenu",
            storageBucket: "guleryuzqrmenu.firebasestorage.app",
            messagingSenderId: "449556886457",
            appId: "1:449556886457:web:f215f6aa95701de02efc68",
            databaseURL: "https://guleryuzqrmenu-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Verileri Yükle
        db.ref('gununMenusu').on('value', snap => { if(snap.exists()) document.getElementById('gunun-menusu').value = snap.val().text || ""; });
        db.ref('paketFiyatlari').on('value', snap => { 
            const data = snap.val() || {c2: 110, c3: 130, c4: 150};
            document.getElementById('fiyat-2').value = data.c2;
            document.getElementById('fiyat-3').value = data.c3;
            document.getElementById('fiyat-4').value = data.c4;
        });

        // Ürünleri Listeleme Fonksiyonu
        function adminUrunListele(kategori, divId) {
            db.ref('menu/' + kategori).on('value', snap => {
                const div = document.getElementById(divId);
                div.innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    div.innerHTML += `
                        <div class="product-item">
                            <span><b>${data.ad}</b> - ₺${data.fiyat} ${data.aciklama ? '('+data.aciklama+')' : ''}</span>
                            <button class="btn-delete" onclick="urunSil('${kategori}', '${child.key}')">Sil</button>
                        </div>
                    `;
                });
            });
        }
        adminUrunListele('anaYemekler', 'admin-ana-yemekler');
        adminUrunListele('icecekler', 'admin-icecekler');

        // Kayıt İşlemleri
        function guncelleGununMenusu() {
            db.ref('gununMenusu').set({ text: document.getElementById('gunun-menusu').value });
            alert("Günün Menüsü güncellendi!");
        }

        function guncellePaketFiyatlari() {
            db.ref('paketFiyatlari').set({
                c2: document.getElementById('fiyat-2').value,
                c3: document.getElementById('fiyat-3').value,
                c4: document.getElementById('fiyat-4').value
            });
            alert("Paket fiyatları güncellendi!");
        }

        function urunEkle() {
            const kategori = document.getElementById('urun-kategori').value;
            const ad = document.getElementById('urun-adi').value;
            const aciklama = document.getElementById('urun-aciklama').value;
            const fiyat = document.getElementById('urun-fiyati').value;
            
            if(!ad || !fiyat) return alert("Lütfen ürün adı ve fiyatı girin!");

            db.ref('menu/' + kategori).push({ ad, aciklama, fiyat });
            
            document.getElementById('urun-adi').value = '';
            document.getElementById('urun-aciklama').value = '';
            document.getElementById('urun-fiyati').value = '';
            alert("Ürün başarıyla eklendi!");
        }

        function urunSil(kategori, id) {
            if(confirm("Bu ürünü silmek istediğinize emin misiniz?")) {
                db.ref('menu/' + kategori + '/' + id).remove();
            }
        }
    </script>
</body>
</html>
